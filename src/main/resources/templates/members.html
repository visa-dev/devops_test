<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="header :: headerFragment">
    <title> Our Gym|Members </title>
</head>

<body>
    <!-- ================= TOP NAVBAR ================= -->
    <nav th:replace="navbar :: navbarFragment"></nav>

    <!-- ================= SIDEBAR ================= -->
    <div th:replace="navbar :: sidebarFragment"></div>

    <!-- ================= MAIN CONTENT ================= -->
    <div class="main-content">
        <div class="container-fluid mt-5 pt-4">
            <div class="row">
                <div class="col-12">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <h2>Members Management</h2>
                            <p class="text-muted">Manage gym members and their information</p>
                        </div>
                        <button class="btn btn-primary" onclick="showAddModal()">
                            <i class="fa-solid fa-plus"></i> Add Member
                        </button>
                    </div>
                    
                    <div class="card">
                        <div class="card-header">
                            <h5>Member List</h5>
                        </div>
                        <div class="card-body">
                            <div id="loadingSpinner" class="text-center py-4" style="display: none;">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                <p class="mt-2">Loading members...</p>
                            </div>
                            
                            <div id="memberTableContainer">
                                <table class="table table-striped table-hover" id="memberTable">
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>Name</th>
                                            <th>NIC</th>
                                            <th>Mobile</th>
                                            <th>Email</th>
                                            <th>Membership</th>
                                            <th>Status</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="memberTableBody">
                                        <!-- Data will be loaded here -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="memberModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Add Member</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="memberForm">
                        <input type="hidden" id="memberId">
                        
                        <div class="mb-3">
                            <label for="name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="nic" class="form-label">NIC Number</label>
                            <input type="text" class="form-control" id="nic" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="mobileno" class="form-label">Mobile Number</label>
                            <input type="text" class="form-control" id="mobileno" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="address" class="form-label">Address</label>
                            <textarea class="form-control" id="address" rows="3"></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label for="membership" class="form-label">Membership Type <span class="text-danger">*</span></label>
                            <select class="form-control" id="membership" required>
                                <option value="">Select Membership...</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="status" class="form-label">Status</label>
                            <select class="form-control" id="status">
                                <option value="true">Active</option>
                                <option value="false">Inactive</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveMember()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= FOOTER ================= -->
    <div th:replace="footer :: footerFragment"></div>

    <script src="/projectResources/jQuery-4.0.0.min.js"></script>
    <script src="/projectResources/bootstrap-5.3.7/js/bootstrap.bundle.min.js"></script>
    <script src="/projectResources/common.js"></script>
    <script>
        let memberModal;
        
        $(document).ready(function() {
            memberModal = new bootstrap.Modal(document.getElementById('memberModal'));
            loadMembers();
        });
        
        function loadMembers() {
            showLoadingSpinner();
            ajaxWithLoading({
                url: '/members/alldata',
                type: 'GET',
                success: function(data) {
                    let tableBody = $('#memberTableBody');
                    tableBody.empty();
                    
                    data.forEach(function(member) {
                        let membershipName = member.membership ? member.membership.name : 'N/A';
                        let row = `
                            <tr>
                                <td>${member.id}</td>
                                <td>${member.name}</td>
                                <td>${member.nic}</td>
                                <td>${member.mobileno}</td>
                                <td>${member.email}</td>
                                <td>${membershipName}</td>
                                <td>
                                    <span class="badge ${member.status ? 'bg-success' : 'bg-danger'}">
                                        ${member.status ? 'Active' : 'Inactive'}
                                    </span>
                                </td>
                                <td>
                                    <button class="btn btn-sm btn-info" onclick="editMember(${member.id})">
                                        <i class="fa-solid fa-edit"></i>
                                    </button>
                                    <button class="btn btn-sm btn-danger" onclick="deleteMember(${member.id})">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        `;
                        tableBody.append(row);
                    });
                    hideLoadingSpinner();
                }
            });
        }
        
        function showAddModal() {
            $('#modalTitle').text('Add Member');
            $('#memberForm')[0].reset();
            $('#memberId').val('');
            loadMembershipsDropdown();
            memberModal.show();
        }
        
        function loadMembershipsDropdown() {
            $.ajax({
                url: '/memberships/alldata',
                type: 'GET',
                success: function(memberships) {
                    let select = $('#membership');
                    select.empty();
                    select.append('<option value="">Select Membership...</option>');
                    memberships.forEach(function(m) {
                        select.append(`<option value="${m.id}">${m.name} - LKR ${m.price} (${m.durationMonths} months)</option>`);
                    });
                },
                error: function() {
                    showAlert('Error loading memberships', 'danger');
                }
            });
        }
        
        function editMember(id) {
            showLoadingSpinner();
            $.ajax({
                url: '/members/byid/' + id,
                type: 'GET',
                success: function(member) {
                    $('#modalTitle').text('Edit Member');
                    $('#memberId').val(member.id);
                    $('#name').val(member.name);
                    $('#nic').val(member.nic);
                    $('#mobileno').val(member.mobileno);
                    $('#email').val(member.email);
                    $('#address').val(member.address);
                    $('#status').val(member.status.toString());
                    loadMembershipsDropdown();
                    if (member.membership) {
                        $('#membership').val(member.membership.id);
                    }
                    hideLoadingSpinner();
                    memberModal.show();
                },
                error: function() {
                    hideLoadingSpinner();
                    showAlert('Error loading member details', 'danger');
                }
            });
        }
        
        function saveMember() {
            if (!validateForm('memberForm')) {
                return;
            }
            
            let membershipId = $('#membership').val();
            if (!membershipId) {
                showAlert('Please select a membership type', 'danger');
                return;
            }
            
            let member = {
                id: $('#memberId').val() ? parseInt($('#memberId').val()) : null,
                name: $('#name').val(),
                nic: $('#nic').val(),
                mobileno: $('#mobileno').val(),
                email: $('#email').val(),
                address: $('#address').val(),
                status: $('#status').val() === 'true',
                membership: {
                    id: parseInt(membershipId)
                }
            };
            
            let url = member.id ? '/members/update' : '/members/save';
            let type = member.id ? 'PUT' : 'POST';
            
            ajaxWithLoading({
                url: url,
                type: type,
                contentType: 'application/json',
                data: JSON.stringify(member),
                success: function(response) {
                    if (response === 'OK') {
                        memberModal.hide();
                        loadMembers();
                        showAlert('Member saved successfully!', 'success');
                    } else {
                        showAlert('Error: ' + response, 'danger');
                    }
                }
            });
        }
        
        function deleteMember(id) {
            confirmAction('Are you sure you want to delete this member?', function() {
                ajaxWithLoading({
                    url: '/members/delete',
                    type: 'DELETE',
                    contentType: 'application/json',
                    data: JSON.stringify({id: id}),
                    success: function(response) {
                        if (response === 'OK') {
                            loadMembers();
                            showAlert('Member deleted successfully!', 'success');
                        } else {
                            showAlert('Error: ' + response, 'danger');
                        }
                    }
                });
            });
        }
    </script>
</body>
</html>
