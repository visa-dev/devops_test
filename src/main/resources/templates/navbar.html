<!-- ================= TOP NAVBAR ================= -->
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<nav class="navbar navbar-expand-lg top-navbar fixed-top px-4" th:fragment="navbarFragment">
    <div class="container-fluid">
        <!-- Logo -->
        <a class="navbar-brand d-flex align-items-center" href="#">
            <img src="/projectResources/Images/OG PRO LOGO.png" class="logo-img" alt="Logo">
        </a>

        <!-- Toggle (mobile) -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Right Side -->
        <div class="collapse navbar-collapse justify-content-end" id="navbarContent">
            <form class="d-flex me-3">
                <input class="form-control me-2" type="search" placeholder="Search">
                <button class="btn btn-gold btn-sm">Search</button>
            </form>
            <span class="me-3 text-muted fw-semibold" th:text="${loggedusername}"> Admin</span>
            <button class="btn btn-gold btn-sm">
                <i class="fa-solid fa-user"></i>
                <span th:text="${loggedusername}">Admin</span>
            </button>
        </div>
    </div>
</nav>
