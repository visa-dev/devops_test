<!DOCTYPE html>
<html lang="en">

<head th:replace="header :: headerFragment">
    <title> Our Gym|Memberships </title>
</head>

<body>
    <!-- ================= TOP NAVBAR ================= -->
    <nav th:replace="navbar :: navbarFragment"></nav>

    <!-- ================= SIDEBAR ================= -->
    <div th:replace="navbar :: sidebarFragment"></div>

    <!-- ================= MAIN CONTENT ================= -->
    <div class="main-content">
        <div class="container-fluid mt-5 pt-4">
            <div class="row">
                <div class="col-12">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <h2>Memberships Management</h2>
                            <p class="text-muted">Manage gym membership plans and subscriptions</p>
                        </div>
                        <button class="btn btn-primary" onclick="showAddModal()">
                            <i class="fa-solid fa-plus"></i> Add Membership
                        </button>
                    </div>
                    
                    <div class="card">
                        <div class="card-header">
                            <h5>Membership Plans</h5>
                        </div>
                        <div class="card-body">
                            <div id="loadingSpinner" class="text-center py-4" style="display: none;">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                <p class="mt-2">Loading memberships...</p>
                            </div>
                            
                            <div id="membershipTableContainer">
                                <table class="table table-striped table-hover" id="membershipTable">
                                    <thead>
                                        <tr>
                                            <th>ID</th>
                                            <th>Name</th>
                                            <th>Description</th>
                                            <th>Price</th>
                                            <th>Duration (Months)</th>
                                            <th>Trainer Type</th>
                                            <th>Status</th>
                                            <th>Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="membershipTableBody">
                                        <!-- Data will be loaded here -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal fade" id="membershipModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Add Membership</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="membershipForm">
                        <input type="hidden" id="membershipId">
                        
                        <div class="mb-3">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" rows="3" required></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label for="price" class="form-label">Price (LKR)</label>
                            <input type="number" class="form-control" id="price" step="0.01" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="durationMonths" class="form-label">Duration (Months)</label>
                            <input type="number" class="form-control" id="durationMonths" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="status" class="form-label">Status</label>
                            <select class="form-control" id="status">
                                <option value="true">Active</option>
                                <option value="false">Inactive</option>
                            </select>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveMembership()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= FOOTER ================= -->
    <div th:replace="footer :: footerFragment"></div>

    <script src="/projectResources/jQuery-4.0.0.min.js"></script>
    <script src="/projectResources/bootstrap-5.3.7/js/bootstrap.bundle.min.js"></script>
    <script>
        let membershipModal;
        
        $(document).ready(function() {
            membershipModal = new bootstrap.Modal(document.getElementById('membershipModal'));
            loadMemberships();
        });
        
        function showLoadingSpinner() {
            $('#loadingSpinner').show();
            $('#membershipTableContainer').hide();
        }
        
        function hideLoadingSpinner() {
            $('#loadingSpinner').hide();
            $('#membershipTableContainer').show();
        }
        
        function loadMemberships() {
            showLoadingSpinner();
            $.ajax({
                url: '/memberships/alldata',
                type: 'GET',
                success: function(data) {
                    let tableBody = $('#membershipTableBody');
                    tableBody.empty();
                    
                    data.forEach(function(membership) {
                        let row = `
                            <tr>
                                <td>${membership.id}</td>
                                <td>${membership.name}</td>
                                <td>${membership.description}</td>
                                <td>LKR ${membership.price ? membership.price.toFixed(2) : '0.00'}</td>
                                <td>${membership.durationMonths}</td>
                                <td>${membership.trainerType ? membership.trainerType.name : 'N/A'}</td>
                                <td>
                                    <span class="badge ${membership.status ? 'bg-success' : 'bg-danger'}">
                                        ${membership.status ? 'Active' : 'Inactive'}
                                    </span>
                                </td>
                                <td>
                                    <button class="btn btn-sm btn-info" onclick="editMembership(${membership.id})">
                                        <i class="fa-solid fa-edit"></i>
                                    </button>
                                    <button class="btn btn-sm btn-danger" onclick="deleteMembership(${membership.id})">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        `;
                        tableBody.append(row);
                    });
                    hideLoadingSpinner();
                },
                error: function() {
                    hideLoadingSpinner();
                    alert('Error loading memberships');
                }
            });
        }
        
        function showAddModal() {
            $('#modalTitle').text('Add Membership');
            $('#membershipForm')[0].reset();
            $('#membershipId').val('');
            membershipModal.show();
        }
        
        function editMembership(id) {
            showLoadingSpinner();
            $.ajax({
                url: '/memberships/byid/' + id,
                type: 'GET',
                success: function(membership) {
                    $('#modalTitle').text('Edit Membership');
                    $('#membershipId').val(membership.id);
                    $('#name').val(membership.name);
                    $('#description').val(membership.description);
                    $('#price').val(membership.price);
                    $('#durationMonths').val(membership.durationMonths);
                    $('#status').val(membership.status.toString());
                    hideLoadingSpinner();
                    membershipModal.show();
                },
                error: function() {
                    hideLoadingSpinner();
                    alert('Error loading membership details');
                }
            });
        }
        
        function saveMembership() {
            let membership = {
                id: $('#membershipId').val() ? parseInt($('#membershipId').val()) : null,
                name: $('#name').val(),
                description: $('#description').val(),
                price: parseFloat($('#price').val()),
                durationMonths: parseInt($('#durationMonths').val()),
                status: $('#status').val() === 'true'
            };
            
            let url = membership.id ? '/memberships/update' : '/memberships/save';
            let type = membership.id ? 'PUT' : 'POST';
            
            showLoadingSpinner();
            $.ajax({
                url: url,
                type: type,
                contentType: 'application/json',
                data: JSON.stringify(membership),
                success: function(response) {
                    hideLoadingSpinner();
                    if (response === 'OK') {
                        membershipModal.hide();
                        loadMemberships();
                        alert('Membership saved successfully!');
                    } else {
                        alert('Error: ' + response);
                    }
                },
                error: function() {
                    hideLoadingSpinner();
                    alert('Error saving membership');
                }
            });
        }
        
        function deleteMembership(id) {
            if (confirm('Are you sure you want to delete this membership?')) {
                showLoadingSpinner();
                $.ajax({
                    url: '/memberships/delete',
                    type: 'DELETE',
                    contentType: 'application/json',
                    data: JSON.stringify({id: id}),
                    success: function(response) {
                        hideLoadingSpinner();
                        if (response === 'OK') {
                            loadMemberships();
                            alert('Membership deleted successfully!');
                        } else {
                            alert('Error: ' + response);
                        }
                    },
                    error: function() {
                        hideLoadingSpinner();
                        alert('Error deleting membership');
                    }
                });
            }
        }
    </script>
</body>
</html>
